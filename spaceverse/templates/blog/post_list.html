{% extends "base.html" %}
{% block content %}
<div class="card tilt" data-aos="fade-up" style="margin-top:14px;"></div>
  <h1>Space Blogs</h1>
  <p>Latest posts about space.</p>
</div>

{% for p in posts %}
  <div class="card tilt" data-aos="fade-up" style="margin-top:14px;"></div>
    <h2><a href="/blog/{{ p.slug }}/">{{ p.title }}</a></h2>
    <p>By {{ p.author }} • {{ p.created_at|date:"d M Y" }}</p>
    <p>{{ p.content|truncatechars:180 }}</p>
    <a class="btn" href="/blog/{{ p.slug }}/">Read</a>
  </div>
{% empty %}
  <div class="card tilt" data-aos="fade-up" style="margin-top:14px;"></div>
    <p>No posts yet. Add from admin.</p>
  </div>
{% endfor %}
{% endblock %}
